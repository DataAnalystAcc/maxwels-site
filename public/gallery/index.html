<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; font-family: sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
  img { max-width: 100%; height: auto; }
</style>
</head>
<body>
  <h1>Gallery</h1>
  <div class="grid" id="gallery"></div>
  <script>
    const files = [
      "Blank Logo 4.png",
      "Screenshot 2026-03-25 125348.png",

      "Screenshot 2026-03-25 125520.png",
      "Screenshot 2026-03-25 125544.png",

      "Screenshot 2026-03-25 125645.png",
      "Screenshot 2026-03-25 125716.png",
      "Screenshot 2026-03-25 125739.png",
      "Screenshot 2026-03-25 125904.png",
      "Screenshot 2026-03-25 125921.png",
      "Screenshot 2026-03-25 130000.png",
      "Screenshot 2026-03-25 130045.png",
      "Screenshot 2026-03-25 130150.png",
      "Screenshot 2026-03-25 130227.png",
      "Screenshot 2026-03-25 130250.png",

</body>
</html>
