version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lead-enricher-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lead_enricher}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    networks:
      - n8n-compose_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lead-enricher-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - n8n-compose_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  core-api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    container_name: lead-enricher-api
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://lead-enricher-redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@lead-enricher-db:5432/${POSTGRES_DB:-lead_enricher}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./services/core-api:/app
    networks:
      - n8n-compose_default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  n8n-compose_default:
    external: true
